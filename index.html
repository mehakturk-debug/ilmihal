<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinimi Öğreniyorum - Gelişmiş Yarışma</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --ana: #1b5e20; --ikinci: #2e7d32; --vurgu: #ffc107; --zemin: #f1f8e9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--zemin); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .ekran { display: none; width: 90%; max-width: 900px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .aktif { display: block; animation: zoomIn 0.4s ease; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .buton { background: var(--ana); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; }
        .vurgu-buton { background: var(--vurgu); color: #333; }
        .girdi { padding: 18px; font-size: 20px; border: 3px solid #eee; border-radius: 15px; width: 80%; text-align: center; margin: 10px; }
        
        /* Başarı Merdiveni */
        .merdiven { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-top: 30px; height: 200px; }
        .kurzu { width: 100px; background: var(--ana); color: white; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; border-radius: 10px 10px 0 0; }
        .k1 { height: 180px; background: #ffd700; color: #333; }
        .k2 { height: 140px; background: #c0c0c0; color: #333; }
        .k3 { height: 100px; background: #cd7f32; color: #333; }

        /* Oyun Öğeleri */
        .sirala-item { background: #eee; padding: 15px; margin: 5px; border-radius: 10px; cursor: move; border: 2px solid #ddd; }
        .cevap-btn { width: 100%; height: 80px; margin: 10px 0; border-radius: 15px; border: none; font-size: 22px; color: white; font-weight: bold; cursor: pointer; }
        .oyuncu-etiket { display: inline-block; padding: 10px 20px; background: var(--ikinci); color: white; border-radius: 50px; margin: 5px; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="ekran-giris" class="ekran aktif">
        <h1>🌙 Dinimi Öğreniyorum</h1>
        <p>Lütfen modunuzu seçiniz:</p>
        <button class="buton" onclick="kurucuMod()">ÖĞRETMEN: Oda Kur</button>
        <button class="buton vurgu-buton" onclick="katilimciMod()">ÖĞRENCİ: Katıl</button>
    </div>

    <!-- ÖĞRETMEN: ODA KURULUM -->
    <div id="ekran-mod-kurulum" class="ekran">
        <h2>Yarışma Odası Hazır</h2>
        <div style="font-size: 50px; font-weight: bold; color: var(--ana); letter-spacing: 10px;" id="oda-kodu">----</div>
        <p>Bağlanan Öğrenciler:</p>
        <div id="mod-liste"></div>
        <button id="btn-baslat" class="buton" style="margin-top:20px" onclick="yarismayiBaslat()" disabled>Bekleniyor...</button>
    </div>

    <!-- ÖĞRETMEN: OYUN ALANI -->
    <div id="ekran-mod-oyun" class="ekran">
        <h2 id="mod-kategori" style="color:var(--ikinci)">Kategori</h2>
        <h1 id="mod-soru">Soru?</h1>
        <div id="mod-sayac" style="font-size:30px; font-weight:bold; color:red">20</div>
        <div id="mod-durum">0 / 0 Kişi Cevapladı</div>
        
        <!-- ANALİZ VE MERDİVEN -->
        <div id="mod-analiz" style="display:none; margin-top:20px">
            <h2 id="dogru-cevap-yazi" style="color:green"></h2>
            <div class="merdiven" id="merdiven-yapi"></div>
            <p id="sesli-analiz" style="font-style: italic; margin-top:10px"></p>
        </div>
    </div>

    <!-- ÖĞRENCİ: KATILIM -->
    <div id="ekran-katil" class="ekran">
        <h2>Hocanın Kodunu Gir</h2>
        <input type="text" id="inp-kod" class="girdi" placeholder="ODA KODU" maxlength="4"><br>
        <input type="text" id="inp-isim" class="girdi" placeholder="ADINIZ SOYADINIZ"><br>
        <button class="buton vurgu-buton" onclick="odayaBaglan()">YARIŞMAYA GİR</button>
    </div>

    <!-- ÖĞRENCİ: OYUN -->
    <div id="ekran-oyuncu-oyun" class="ekran">
        <div id="oyuncu-alan"></div>
    </div>

    <script>
        // --- SORU BANKASI (Sf 262-270 Gelişmiş Kategoriler) ---
        const sorular = [
            { t: "test", k: "Akâid (Sf 262)", s: "Ruhlarımıza 'Ben sizin Rabbiniz değil miyim?' denilen zamana ne denir?", o: ["Hicret", "Mîsâk", "Ezel", "Ahiret"], c: 1 },
            { t: "sirala", k: "Abdest (Sf 267)", s: "Abdestin farzlarını doğru sıraya diziniz:", o: ["Yüzü yıkamak", "Elleri yıkamak", "Baş meshi", "Ayakları yıkamak"], c: [1, 0, 2, 3] },
            { t: "bosluk", k: "Mezhep (Sf 266)", s: "Amelde mezhebimiz _______ mezhebidir.", o: ["Maturidi", "Eşari", "Hanefi"], c: 2 },
            { t: "test", k: "Namaz (Sf 268)", s: "Yatsı namazı toplam kaç rekattır?", o: ["10", "13", "5", "40"], c: 1 },
            { t: "sirala", k: "Kandiller (Sf 269)", s: "Kandilleri takvime göre sıralayın (Mevlit ilk):", o: ["Mevlit", "Regaip", "Miraç", "Berat", "Kadir"], c: [0, 1, 2, 3, 4] }
        ];

        let peer, conn, roomID, players = [], currentQ = 0, timer;

        function ekranGoster(id) {
            document.querySelectorAll('.ekran').forEach(e => e.classList.remove('aktif'));
            document.getElementById(id).classList.add('aktif');
        }

        // --- ÖĞRETMEN MODU ---
        function kurucuMod() {
            roomID = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('oda-kodu').innerText = roomID;
            peer = new Peer("DIN-" + roomID);
            peer.on('open', () => ekranGoster('ekran-mod-kurulum'));
            peer.on('connection', c => {
                c.on('data', data => {
                    if(data.type === 'JOIN') {
                        players.push({ id: c.peer, conn: c, name: data.name, score: 0, ans: null, time: 0 });
                        modListeGuncelle();
                    }
                    if(data.type === 'ANS') {
                        let p = players.find(x => x.id === c.peer);
                        p.ans = data.val; p.time = Date.now();
                        durumGuncelle();
                    }
                });
            });
        }

        function modListeGuncelle() {
            document.getElementById('mod-liste').innerHTML = players.map(p => `<span class="oyuncu-etiket">${p.name}</span>`).join('');
            document.getElementById('btn-baslat').disabled = players.length === 0;
            document.getElementById('btn-baslat').innerText = players.length + " Kişiyle Başlat";
        }

        function yarismayiBaslat() {
            ekranGoster('ekran-mod-oyun');
            yayinla({ type: 'START' });
            soruYukle();
        }

        function soruYukle() {
            players.forEach(p => p.ans = null);
            let q = sorular[currentQ];
            document.getElementById('mod-kategori').innerText = q.k;
            document.getElementById('mod-soru').innerText = q.s;
            document.getElementById('mod-analiz').style.display = 'none';
            yayinla({ type: 'QUES', q: q });
            sayacBaslat(30);
            durumGuncelle();
        }

        function durumGuncelle() {
            let c = players.filter(p => p.ans !== null).length;
            document.getElementById('mod-durum').innerText = `${c} / ${players.length} Kişi Cevapladı`;
            if(c === players.length && players.length > 0) analizYap();
        }

        function analizYap() {
            clearInterval(timer);
            let q = sorular[currentQ];
            players.forEach(p => {
                let dogru = JSON.stringify(p.ans) === JSON.stringify(q.c);
                if(dogru) p.score += 10;
                p.conn.send({ type: 'RESULT', correct: dogru });
            });

            // Merdiven ve Ses
            let top3 = [...players].sort((a,b) => b.score - a.score).slice(0, 3);
            let q_analiz = `${players.length} kişiden ${players.filter(p => JSON.stringify(p.ans) === JSON.stringify(q.c)).length} tanesi doğru bildi.`;
            
            document.getElementById('dogru-cevap-yazi').innerText = "Doğru Cevap Verildi!";
            document.getElementById('sesli-analiz').innerText = q_analiz;
            document.getElementById('mod-analiz').style.display = 'block';

            // Başarı Merdiveni Görseli
            document.getElementById('merdiven-yapi').innerHTML = top3.map((p, i) => `
                <div class="kurzu k${i+1}">
                    <div style="font-size:12px">${p.name}</div>
                    <b>${i+1}.</b>
                </div>
            `).join('');

            konus(`${q.s} sorusu bitti. ${q_analiz}. Şu an zirvede ${top3[0].name} bulunuyor.`);

            setTimeout(() => {
                if(currentQ < sorular.length -1) { currentQ++; soruYukle(); }
                else konus("Yarışma sona erdi. Hepiniz harikaydınız.");
            }, 8000);
        }

        // --- ÖĞRENCİ MODU ---
        function katilimciMod() { ekranGoster('ekran-katil'); }

        function odayaBaglan() {
            let kod = document.getElementById('inp-kod').value.toUpperCase();
            let isim = document.getElementById('inp-isim').value;
            if(!kod || !isim) return alert("Hatalı Giriş!");

            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect("DIN-" + kod);
                conn.on('open', () => {
                    conn.send({ type: 'JOIN', name: isim });
                    document.getElementById('ekran-katil').innerHTML = `<h1>Bağlandın ${isim}</h1><p>Hocanın başlatması bekleniyor...</p>`;
                });
                conn.on('data', data => {
                    if(data.type === 'START') ekranGoster('ekran-oyuncu-oyun');
                    if(data.type === 'QUES') oyuncuSoruGoster(data.q);
                    if(data.type === 'RESULT' && data.correct) {
                        confetti();
                        if(navigator.vibrate) navigator.vibrate(300);
                    }
                });
            });
        }

        function oyuncuSoruGoster(q) {
            ekranGoster('ekran-oyuncu-oyun');
            const alan = document.getElementById('oyuncu-alan');
            alan.innerHTML = `<h3>${q.k}</h3><h2>${q.s}</h2>`;

            if(q.t === 'test' || q.t === 'bosluk') {
                q.o.forEach((o, i) => {
                    let b = document.createElement('button');
                    b.className = 'cevap-btn'; b.innerText = o;
                    b.style.background = ['#e74c3c','#3498db','#2ecc71','#f1c40f'][i];
                    b.onclick = () => { conn.send({ type: 'ANS', val: i }); alan.innerHTML = "<h2>Cevap Gitti!</h2>"; };
                    alan.appendChild(b);
                });
            } else if(q.t === 'sirala') {
                let pool = [...q.o].map((text, index) => ({text, index}));
                let currentSort = [];
                let renderSort = () => {
                    alan.innerHTML = `<h3>Sırala:</h3>`;
                    pool.forEach((item, i) => {
                        let b = document.createElement('div'); b.className = 'sirala-item';
                        b.innerText = item.text;
                        b.onclick = () => { currentSort.push(item.index); pool.splice(i, 1); renderSort(); };
                        alan.appendChild(b);
                    });
                    alan.innerHTML += `<hr><b>Senin Sıran:</b><br>` + currentSort.map(idx => q.o[idx]).join(' -> ');
                    if(pool.length === 0) {
                        let sb = document.createElement('button'); sb.className='buton'; sb.innerText="SIRALAMAYI GÖNDER";
                        sb.onclick = () => { conn.send({ type: 'ANS', val: currentSort }); alan.innerHTML = "<h2>Sıralama Gitti!</h2>"; };
                        alan.appendChild(sb);
                    }
                };
                renderSort();
            }
        }

        // --- ARAÇLAR ---
        function sayacBaslat(sn) {
            let k = sn; clearInterval(timer);
            timer = setInterval(() => { k--; document.getElementById('mod-sayac').innerText = k; if(k<=0) analizYap(); }, 1000);
        }
        function broadcast(d) { players.forEach(p => p.conn.send(d)); }
        function yayinla(d) { players.forEach(p => p.conn.send(d)); }
        function konus(m) { let u = new SpeechSynthesisUtterance(m); u.lang = 'tr-TR'; window.speechSynthesis.speak(u); }
    </script>
</body>
</html>
