<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinimi Öğreniyorum - Pro Yarışma</title>
    <!-- Kütüphaneler -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #004d40; --s: #009688; --a: #ffc107; --bg: #f0f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        
        /* MODERATOR UI */
        #mod-panel { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 1000px; margin-top: 20px; }
        .room-badge { background: var(--p); color: white; padding: 10px 30px; border-radius: 50px; font-size: 30px; letter-spacing: 5px; font-weight: bold; margin: 15px; }
        
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 20px; width: 100%; }
        .p-box { background: white; border: 3px solid var(--s); border-radius: 15px; padding: 10px; text-align: center; }
        .p-box.answered { background: #c8e6c9; border-color: #2e7d32; }

        /* OYUN ALANI */
        #game-screen { display: none; width: 95%; max-width: 1100px; margin: auto; }
        .q-text { font-size: 36px; font-weight: bold; color: var(--p); margin: 20px 0; }
        
        /* PLAYER UI */
        #player-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .avatar-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .av { font-size: 40px; cursor: pointer; padding: 5px; border: 3px solid transparent; border-radius: 50%; }
        .av.selected { border-color: var(--a); background: white; }
        .ans-btn { width: 100%; height: 120px; margin: 10px 0; border: none; border-radius: 20px; font-size: 24px; font-weight: bold; color: white; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .btn-main { background: var(--a); border: none; padding: 15px 40px; font-size: 22px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        input { padding: 15px; font-size: 20px; width: 80%; border-radius: 10px; border: 2px solid #ccc; text-align: center; }
    </style>
</head>
<body>

    <!-- MODERATÖR EKRANI -->
    <div id="mod-panel">
        <div class="card" id="setup-screen">
            <h1>Dinimi Öğreniyorum - Moderatör Paneli</h1>
            <p>Öğrencileriniz için Giriş Kodu:</p>
            <div class="room-badge" id="room-code-display">----</div>
            <div class="players-grid" id="player-list"></div>
            <div style="margin-top: 30px;">
                <button class="btn-main" id="start-btn" onclick="startTournament()" disabled>Oyuncular Bekleniyor...</button>
            </div>
        </div>

        <div id="game-screen">
            <div class="card">
                <div id="cat-title" style="color: var(--s); font-weight: bold;">Kategori</div>
                <div class="q-text" id="main-q">Soru?</div>
                <div id="ans-status" style="font-size: 20px; margin-bottom: 10px;">Cevap Verenler: 0 / 0</div>
                <div id="result-box" style="display:none; padding: 20px; border-radius: 15px; background: #e8f5e9;">
                    <h2 id="correct-ans-label" style="color: #2e7d32;">Doğru Cevap: ...</h2>
                    <p id="analysis-text" style="font-size: 18px; font-style: italic;"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- OYUNCU EKRANI -->
    <div id="player-panel">
        <div id="join-form">
            <h2>Yarışmaya Katıl</h2>
            <input type="text" id="p-code" placeholder="Oda Kodunu Gir" maxlength="4" style="margin-bottom:10px; border-color: var(--a);"><br>
            <input type="text" id="p-name" placeholder="Adını Yaz..."><br>
            <div class="avatar-list" id="avatar-list"></div>
            <button class="btn-main" onclick="connectToRoom()">Giriş Yap</button>
        </div>

        <div id="wait-screen" style="display:none;">
            <div id="my-av-display" style="font-size: 80px;"></div>
            <h2 id="my-name-display"></h2>
            <p>Oda kuruldu, moderatör bekleniyor...</p>
        </div>

        <div id="play-screen" style="display:none; width: 100%;">
            <div id="options-zone"></div>
        </div>
    </div>

    <script>
        // SORU BANKASI (Özetlenmiş, 30 soru kapasiteli)
        const bank = [
            {cat:"İman (Sf. 262)", q:"Allah'ın zatı hakkında düşünmek caiz midir?", o:["Evet", "Hayır", "Sadece alimlere", "Bazen"], a:1},
            {cat:"Soyumuz (Sf. 263)", q:"Hangi Peygamberin milletindeniz?", o:["Hz. Adem", "Hz. İbrahim", "Hz. Muhammed", "Hz. Musa"], a:1},
            {cat:"Mezhepler (Sf. 266)", q:"İtikatta mezhebimiz hangisidir?", o:["Hanefi", "Şafii", "Maturidi", "Eşari"], a:2},
            {cat:"Namaz (Sf. 268)", q:"Bir günlük namaz toplam kaç rekattır?", o:["17", "33", "40", "20"], a:2},
            {cat:"Kandiller (Sf. 269)", q:"Kur'an'ın inmeye başladığı gece hangisidir?", o:["Mevlit", "Miraç", "Kadir", "Berat"], a:2}
            // Soru bankası buraya sayfa sayfa eklenebilir...
        ];

        let peer, conn, players = [], currentQ = 0, roomID, timer;
        const avatars = ["🦁","🦊","🐼","⚽","🕌","⭐","🍎","🚀"];
        let selAv = avatars[0];

        // 1. MODERATOR MANTIĞI
        if (!window.location.hash) {
            roomID = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('room-code-display').innerText = roomID;
            peer = new Peer(roomID);

            peer.on('connection', c => {
                c.on('data', data => {
                    if (data.type === 'JOIN') {
                        players.push({ peer: c.peer, conn: c, name: data.name, av: data.av, score: 0, lastAns: null });
                        updateModUI();
                    }
                    if (data.type === 'ANS') {
                        let p = players.find(x => x.peer === c.peer);
                        p.lastAns = data.idx;
                        p.ansTime = Date.now();
                        checkAllAnswered();
                    }
                });
            });
        } 
        // 2. OYUNCU MANTIĞI
        else {
            document.getElementById('mod-panel').style.display = 'none';
            document.getElementById('player-panel').style.display = 'flex';
            const avDiv = document.getElementById('avatar-list');
            avatars.forEach(a => {
                let s = document.createElement('span'); s.className = 'av'; s.innerText = a;
                s.onclick = () => { document.querySelectorAll('.av').forEach(x=>x.classList.remove('selected')); s.classList.add('selected'); selAv = a; };
                avDiv.appendChild(s);
            });
        }

        function connectToRoom() {
            let code = document.getElementById('p-code').value.toUpperCase();
            let name = document.getElementById('p-name').value;
            if(!code || !name) return alert("Eksik bilgi!");
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(code);
                conn.on('open', () => {
                    conn.send({ type: 'JOIN', name: name, av: selAv });
                    document.getElementById('join-form').style.display = 'none';
                    document.getElementById('wait-screen').style.display = 'block';
                    document.getElementById('my-name-display').innerText = name;
                    document.getElementById('my-av-display').innerText = selAv;
                });
                conn.on('data', data => {
                    if(data.type === 'START') {
                        document.getElementById('wait-screen').style.display = 'none';
                        document.getElementById('play-screen').style.display = 'block';
                    }
                    if(data.type === 'QUES') showOptions(data.opts);
                    if(data.type === 'RESULT') {
                        if(data.correct) {
                            confetti();
                            if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
                        }
                    }
                });
            });
        }

        function updateModUI() {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map(p => `
                <div class="p-box ${p.lastAns !== null ? 'answered' : ''}">
                    <div style="font-size:30px">${p.av}</div>
                    <b>${p.name}</b>
                </div>
            `).join('');
            document.getElementById('start-btn').disabled = players.length === 0;
            document.getElementById('start-btn').innerText = players.length + " Kişiyle Başlat";
            if(document.getElementById('game-screen').style.display === 'block') {
                document.getElementById('ans-status').innerText = `Cevap Verenler: ${players.filter(x=>x.lastAns!==null).length} / ${players.length}`;
            }
        }

        function startTournament() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            broadcast({ type: 'START' });
            loadQuestion();
        }

        function loadQuestion() {
            players.forEach(p => p.lastAns = null);
            let q = bank[currentQ];
            document.getElementById('cat-title').innerText = q.cat;
            document.getElementById('main-q').innerText = q.q;
            document.getElementById('result-box').style.display = 'none';
            updateModUI();
            broadcast({ type: 'QUES', opts: q.o });
        }

        function checkAllAnswered() {
            updateModUI();
            if (players.every(p => p.lastAns !== null)) {
                setTimeout(revealAnalysis, 500);
            }
        }

        function revealAnalysis() {
            let q = bank[currentQ];
            let correctCount = players.filter(p => p.lastAns === q.a).length;
            let fastest = players.filter(p => p.lastAns === q.a).sort((a,b) => a.ansTime - b.ansTime)[0];
            
            let analysis = `${players.length} öğrenciden ${correctCount} tanesi doğru cevap verdi. `;
            if(fastest) analysis += `En hızlı doğru cevabı ${fastest.name} verdi.`;
            
            document.getElementById('correct-ans-label').innerText = "Doğru Cevap: " + q.o[q.a];
            document.getElementById('analysis-text').innerText = analysis;
            document.getElementById('result-box').style.display = 'block';

            // SESLİ ANALİZ
            speak(q.q + " sorusunun doğru cevabı " + q.o[q.a] + " olacaktı. " + analysis);

            // Oyunculara sonuç gönder
            players.forEach(p => {
                p.conn.send({ type: 'RESULT', correct: p.lastAns === q.a });
            });

            setTimeout(() => {
                if(currentQ < bank.length - 1) {
                    currentQ++;
                    loadQuestion();
                } else {
                    speak("Yarışma sona erdi. Katılan tüm öğrencilere teşekkürler.");
                }
            }, 7000);
        }

        function showOptions(opts) {
            const zone = document.getElementById('options-zone');
            zone.innerHTML = "";
            const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f'];
            opts.forEach((o, i) => {
                let b = document.createElement('button'); b.className = 'ans-btn';
                b.style.background = colors[i]; b.innerText = o;
                b.onclick = () => {
                    conn.send({ type: 'ANS', idx: i });
                    zone.innerHTML = "<h2>Cevap Gönderildi! Bekle...</h2>";
                };
                zone.appendChild(b);
            });
        }

        function broadcast(data) { players.forEach(p => p.conn.send(data)); }

        function speak(text) {
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 1;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
