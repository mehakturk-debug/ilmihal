<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinimi Öğreniyorum - Pro Yarışma Sistemi</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #004d40; --s: #009688; --a: #ffc107; --bg: #f0f4f4; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        /* MODERATOR UI */
        #mod-panel { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 1000px; }
        #qr-container { background: white; padding: 15px; display: inline-block; border-radius: 10px; margin: 15px; }
        
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; width: 100%; }
        .p-box { background: white; border: 3px solid var(--s); border-radius: 15px; padding: 10px; text-align: center; animation: pop 0.4s ease; }
        .p-box img { width: 50px; height: 50px; border-radius: 50%; display: block; margin: 0 auto 5px; }
        
        /* OYUN ALANI */
        #game-screen { display: none; width: 95%; max-width: 1100px; margin: 20px auto; }
        .category-header { background: var(--p); color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 24px; }
        .q-text { font-size: 32px; font-weight: bold; margin: 30px 0; min-height: 100px; }
        
        /* PLAYER UI */
        #player-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .avatar-select { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .av-img { width: 60px; height: 60px; cursor: pointer; border: 3px solid transparent; border-radius: 50%; transition: 0.2s; }
        .av-img.selected { border-color: var(--a); transform: scale(1.1); }
        .ans-btn { width: 100%; height: 100px; margin: 10px 0; border: none; border-radius: 20px; font-size: 24px; font-weight: bold; color: white; cursor: pointer; }

        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .btn-main { background: var(--a); border: none; padding: 15px 40px; font-size: 22px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .leaderboard { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .leaderboard td { padding: 10px; border-bottom: 1px solid #eee; font-size: 20px; }
    </style>
</head>
<body>

    <!-- MODERATÖR EKRANI (AKILLI TAHTA) -->
    <div id="mod-panel">
        <div class="card" id="setup-screen">
            <h1>Dinimi Öğreniyorum Bilgi Yarışması</h1>
            <p>Akıllı Telefonunuzdan QR Kodu Okutun, Profilinizi Seçin ve Katılın!</p>
            <div id="qr-container"></div>
            <div id="room-id" style="font-weight: bold; font-size: 20px; color: var(--s);"></div>
            <div class="players-grid" id="player-list"></div>
            <div style="margin-top: 30px;">
                <button class="btn-main" id="start-btn" onclick="startTournament()" disabled>Oyuncular Bekleniyor...</button>
            </div>
        </div>

        <div id="game-screen">
            <div class="card">
                <div class="category-header" id="cat-title">Kategori 1</div>
                <div id="round-info" style="font-weight: bold; color: var(--s);">Soru: 1 / 3</div>
                <div class="q-text" id="main-q">Soru buraya gelecek?</div>
                <div id="answer-reveal" style="font-size: 28px; font-weight: bold; color: #2e7d32; display: none;"></div>
                <div id="timer" style="font-size: 40px; font-weight: bold; color: #c62828;">20</div>
            </div>
            
            <div class="card" id="lb-screen" style="display:none; margin-top: 20px;">
                <h2>🏆 Liderlik Tablosu</h2>
                <table class="leaderboard" id="lb-table"></table>
                <button class="btn-main" style="margin-top:20px" onclick="nextAction()">Devam Et</button>
            </div>
        </div>
    </div>

    <!-- OYUNCU EKRANI (TELEFON) -->
    <div id="player-panel">
        <div id="join-form">
            <h2>Profilini Oluştur</h2>
            <div class="avatar-select" id="avatar-list"></div>
            <input type="text" id="p-name" placeholder="Adını Yaz..." style="padding:15px; font-size:20px; width:80%; border-radius:10px; border:2px solid #ccc;">
            <br><br>
            <button class="btn-main" onclick="joinGame()">Yarışmaya Katıl</button>
        </div>

        <div id="wait-screen" style="display:none; text-align:center;">
            <img id="my-av" src="" style="width:100px; border-radius:50%;">
            <h2 id="my-name"></h2>
            <p>Hazır Ol! Yarışma birazdan başlayacak...</p>
        </div>

        <div id="play-screen" style="display:none; width:100%;">
            <h2 id="p-status">Cevap Bekleniyor...</h2>
            <div id="options-zone"></div>
        </div>
    </div>

    <script>
        // SORU BANKASI (262-270 SAYFALARIN TAMAMI)
        const questionBank = [
            {
                cat: "İman ve Yaratılış (Sf. 262)",
                qs: [
                    {q: "Ruhlarımıza 'Ben sizin Rabbiniz değil miyim?' denilen zamana ne denir?", o: ["Mîsâk", "Kâlû Belâ", "Hicret", "Ezel"], a: 0},
                    {q: "Sadece sıfatları hakkında düşünülebilen, zatı hakkında düşünmek caiz olmayan kimdir?", o: ["Melekler", "Peygamberler", "Allahü Teâlâ", "Alimler"], a: 2},
                    {q: "İhlas Suresi'nin ilk ayetinin manası nedir?", o: ["Allah birdir", "Allah büyüktür", "Hamd Allah'adır", "Tövbe ediniz"], a: 0}
                ]
            },
            {
                cat: "Soyumuz ve Milletimiz (Sf. 263)",
                qs: [
                    {q: "Kimin zürriyetindensin?", o: ["Hz. İbrahim", "Hz. Adem", "Hz. Muhammed", "Hz. Nuh"], a: 1},
                    {q: "Kimin milletindensin?", o: ["Hz. İbrahim", "Hz. Adem", "Hz. Muhammed", "Hz. İsmail"], a: 0},
                    {q: "Kimin ümmetindensin?", o: ["Hz. İbrahim", "Hz. Adem", "Hz. Muhammed", "Hz. İsa"], a: 2}
                ]
            },
            {
                cat: "Efendimizin Ailesi (Sf. 264)",
                qs: [
                    {q: "Efendimizin kaç kızı vardı?", o: ["2", "3", "4", "7"], a: 2},
                    {q: "Efendimizin kaç oğlu doğmuştur?", o: ["2", "3", "4", "5"], a: 1},
                    {q: "En son vefat eden hanımı kimdir?", o: ["Hz. Aişe", "Hz. Hatice", "Hz. Ümmü Seleme", "Hz. Safiye"], a: 2}
                ]
            },
            {
                cat: "Peygamberler ve Melekler (Sf. 265)",
                qs: [
                    {q: "Kur'an-ı Kerim'de ismi geçen kaç peygamber vardır?", o: ["25", "28", "40", "124.000"], a: 1},
                    {q: "Rızıkları yöneten büyük melek hangisidir?", o: ["Cebrail", "Mikail", "İsrafil", "Azrail"], a: 1},
                    {q: "Hz. Davud'a (a.s) hangi kitap inmiştir?", o: ["Tevrat", "Zebur", "İncil", "Kur'an"], a: 1}
                ]
            },
            {
                cat: "Mezhepler (Sf. 266)",
                qs: [
                    {q: "İtikatta mezhebimiz hangisidir?", o: ["Hanefi", "Maturidi", "Eş'ari", "Şafii"], a: 1},
                    {q: "İmam-ı Azam Ebu Hanife hangi mezhebin imamıdır?", a: ["Hanefi", "Şafii", "Maliki", "Hanbeli"], a: 0},
                    {q: "Maturidi mezhebi imamı nerede vefat etmiştir?", o: ["Basra", "Semerkant", "Bağdat", "Mekke"], a: 1}
                ]
            },
            {
                cat: "32 Farz ve İslam (Sf. 267)",
                qs: [
                    {q: "32 farzın kaç tanesi namazın farzıdır?", o: ["4", "6", "12", "5"], a: 2},
                    {q: "Abdestin farzı kaçtır?", o: ["3", "4", "6", "12"], a: 1},
                    {q: "Guslün farzı kaçtır?", o: ["1", "2", "3", "4"], a: 2}
                ]
            },
            {
                cat: "Namaz ve Şartları (Sf. 268)",
                qs: [
                    {q: "Namazın dışındaki farzlara ne denir?", o: ["Şart", "Rükün", "Vacip", "Sünnet"], a: 0},
                    {q: "Teyemmümün farzı kaçtır?", o: ["2", "3", "4", "5"], a: 0},
                    {q: "Bir günde toplam kaç rekat namaz kılınır?", o: ["17", "33", "40", "20"], a: 2}
                ]
            },
            {
                cat: "Namazda Yanılma (Sf. 269)",
                qs: [
                    {q: "Zammı sureyi unutunca hangi secde gerekir?", o: ["Şükür", "Tilavet", "Sehiv", "Kaza"], a: 2},
                    {q: "Kaç tane kandil vardır?", o: ["3", "4", "5", "6"], a: 2},
                    {q: "Kandil geceleri içinde Kur'an'ın indiği gece?", o: ["Mevlit", "Miraç", "Kadir", "Berat"], a: 2}
                ]
            },
            {
                cat: "Kandiller ve Anlamları (Sf. 270)",
                qs: [
                    {q: "Berat Kandili hangi olay için kutlanır?", o: ["Doğum", "Yükseliş", "Affedilme", "İniş"], a: 2},
                    {q: "İlahi saltanatı seyretmek için yükselme gecesi?", o: ["Regaip", "Miraç", "Kadir", "Mevlit"], a: 1},
                    {q: "Efendimizin dünyaya teşrif ettiği gece?", o: ["Mevlit", "Regaip", "Miraç", "Berat"], a: 0}
                ]
            },
            {
                cat: "Genel Tekrar (Sf. 262-270)",
                qs: [
                    {q: "40 yaşında ne olmuştur?", o: ["Evlendi", "Hicret etti", "Peygamber oldu", "Vefat etti"], a: 2},
                    {q: "Namazın içindeki farzlar kaç tanedir?", o: ["5", "6", "12", "4"], a: 1},
                    {q: "Suhuflar toplam kaç tanedir?", o: ["10", "50", "100", "110"], a: 2}
                ]
            }
        ];

        // PEERJS ALTYAPISI
        let peer, conn;
        let players = [];
        let currentCat = 0;
        let currentQ = 0;
        let roomID = "DIN" + Math.floor(1000 + Math.random() * 9000);
        let timerInterval;

        const avatars = ["🦁", "🦒", "🐘", "🦉", "🦋", "🦄", "🐼", "🦊", "🚀", "🎨", "⚽", "🕌"];
        let selectedAvatar = avatars[0];

        // MODERATÖR KURULUMU
        if (!window.location.hash) {
            peer = new Peer(roomID);
            peer.on('open', id => {
                document.getElementById('room-id').innerText = "ODA KODU: " + id;
                const url = window.location.href + "#" + id;
                new QRCode(document.getElementById("qr-container"), { text: url, width: 200, height: 200 });
            });
            peer.on('connection', c => {
                c.on('data', data => {
                    if (data.type === 'JOIN') {
                        if(!players.find(p => p.peer === c.peer)) {
                            players.push({ peer: c.peer, conn: c, name: data.name, avatar: data.avatar, score: 0 });
                            updatePlayerList();
                            if(players.length >= 1) document.getElementById('start-btn').disabled = false;
                            document.getElementById('start-btn').innerText = players.length + " Oyuncu Başlat";
                        }
                    }
                    if (data.type === 'ANSWER') {
                        handlePlayerAnswer(c.peer, data.index);
                    }
                });
            });
        } 
        // OYUNCU KURULUMU
        else {
            document.getElementById('mod-panel').style.display = 'none';
            document.getElementById('player-panel').style.display = 'flex';
            roomID = window.location.hash.substring(1);
            
            const avList = document.getElementById('avatar-list');
            avatars.forEach(a => {
                const span = document.createElement('div');
                span.className = "av-img";
                span.innerText = a;
                span.style.fontSize = "40px";
                span.onclick = () => {
                    document.querySelectorAll('.av-img').forEach(i => i.classList.remove('selected'));
                    span.classList.add('selected');
                    selectedAvatar = a;
                };
                avList.appendChild(span);
            });
        }

        function joinGame() {
            const name = document.getElementById('p-name').value;
            if(!name) return alert("İsim yazmalısın!");
            
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(roomID);
                conn.on('open', () => {
                    conn.send({ type: 'JOIN', name: name, avatar: selectedAvatar });
                    document.getElementById('join-form').style.display = 'none';
                    document.getElementById('wait-screen').style.display = 'block';
                    document.getElementById('my-name').innerText = name;
                    document.getElementById('my-av').src = ""; // Simge olarak kalsın
                });
                conn.on('data', data => {
                    if(data.type === 'GAME_START') {
                        document.getElementById('wait-screen').style.display = 'none';
                        document.getElementById('play-screen').style.display = 'block';
                    }
                    if(data.type === 'NEW_Q') {
                        showOptionsToPlayer(data.options);
                    }
                    if(data.type === 'ROUND_OVER') {
                        document.getElementById('options-zone').innerHTML = "<h3>Tur Bitti! Tahtaya Bak 🏆</h3>";
                    }
                });
            });
        }

        function updatePlayerList() {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map(p => `
                <div class="p-box">
                    <div style="font-size:30px">${p.avatar}</div>
                    <b>${p.name}</b>
                </div>
            `).join('');
        }

        function startTournament() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            broadcast({ type: 'GAME_START' });
            loadQuestion();
        }

        function loadQuestion() {
            const cat = questionBank[currentCat];
            const q = cat.qs[currentQ];
            
            document.getElementById('cat-title').innerText = cat.cat;
            document.getElementById('round-info').innerText = `Soru: ${currentQ + 1} / 3`;
            document.getElementById('main-q').innerText = q.q;
            document.getElementById('answer-reveal').style.display = "none";
            document.getElementById('lb-screen').style.display = "none";
            
            broadcast({ type: 'NEW_Q', options: q.o });
            startTimer(20);
        }

        function startTimer(sec) {
            let timeLeft = sec;
            document.getElementById('timer').innerText = timeLeft;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    revealAnswer();
                }
            }, 1000);
        }

        function revealAnswer() {
            const correctIdx = questionBank[currentCat].qs[currentQ].a;
            const correctText = questionBank[currentCat].qs[currentQ].o[correctIdx];
            document.getElementById('answer-reveal').innerText = "Doğru Cevap: " + correctText;
            document.getElementById('answer-reveal').style.display = "block";
            
            setTimeout(() => {
                if(currentQ < 2) {
                    currentQ++;
                    loadQuestion();
                } else {
                    showLeaderboard();
                }
            }, 3000);
        }

        function showLeaderboard() {
            document.getElementById('lb-screen').style.display = "block";
            const table = document.getElementById('lb-table');
            players.sort((a,b) => b.score - a.score);
            table.innerHTML = players.map((p, i) => `
                <tr>
                    <td>${i+1}.</td>
                    <td>${p.avatar}</td>
                    <td>${p.name}</td>
                    <td><b>${p.score} P</b></td>
                </tr>
            `).join('');
            broadcast({ type: 'ROUND_OVER' });
        }

        function nextAction() {
            if(currentCat < 9) {
                currentCat++;
                currentQ = 0;
                loadQuestion();
            } else {
                alert("Yarışma Bitti! Tüm Kategoriler Tamamlandı.");
            }
        }

        function handlePlayerAnswer(peerID, ansIdx) {
            const player = players.find(p => p.peer === peerID);
            const correctIdx = questionBank[currentCat].qs[currentQ].a;
            if(ansIdx === correctIdx) {
                player.score += 10;
            }
        }

        function showOptionsToPlayer(opts) {
            const zone = document.getElementById('options-zone');
            zone.innerHTML = "";
            const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f'];
            opts.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = "ans-btn";
                btn.style.background = colors[i];
                btn.innerText = o;
                btn.onclick = () => {
                    conn.send({ type: 'ANSWER', index: i });
                    zone.innerHTML = "<h2>Cevap Alındı! Tahtayı Bekle...</h2>";
                };
                zone.appendChild(btn);
            });
            document.getElementById('p-status').innerText = "Cevabını Seç!";
        }

        function broadcast(data) {
            players.forEach(p => p.conn.send(data));
        }
    </script>
</body>
</html>
