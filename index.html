<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinimi Öğreniyorum - 20 Soruluk Dev Turnuva</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --ana: #2e7d32; --ikinci: #1b5e20; --vurgu: #ffc107; --zemin: #f1f8e9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--zemin); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .ekran { display: none; width: 90%; max-width: 900px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .aktif { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .buton { background: var(--ana); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; }
        .vurgu-buton { background: var(--vurgu); color: #333; }
        .girdi { padding: 18px; font-size: 20px; border: 3px solid #eee; border-radius: 15px; width: 80%; text-align: center; margin: 10px; }
        
        /* Sıralama Sorusu Tasarımı */
        .sirala-kutu { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .sirala-item { background: #f8f9fa; border: 2px solid #dee2e6; padding: 15px; border-radius: 12px; cursor: pointer; position: relative; font-size: 20px; font-weight: bold; }
        .sirala-item.selected::after { content: attr(data-index); position: absolute; right: 15px; background: var(--vurgu); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 16px; top: 50%; transform: translateY(-50%); }

        /* Başarı Merdiveni */
        .merdiven { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-top: 30px; height: 180px; }
        .podium { width: 100px; color: white; display: flex; flex-direction: column; justify-content: flex-end; border-radius: 15px 15px 0 0; padding-bottom: 10px; font-weight: bold; }
        .gold { height: 160px; background: #ffd700; color: #333; }
        .silver { height: 120px; background: #c0c0c0; color: #333; }
        .bronze { height: 90px; background: #cd7f32; color: #333; }
        
        #mod-durum { font-size: 22px; color: var(--ikinci); margin: 15px 0; font-weight: bold; }
        #timer { font-size: 35px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ekran-giris" class="ekran aktif">
        <h1>🌙 Dinimi Öğreniyorum</h1>
        <p>Gelişmiş Sıralama ve Boşluk Doldurma Yarışması</p>
        <button class="buton" onclick="kurucuMod()">ÖĞRETMEN: Oda Kur</button>
        <button class="buton vurgu-buton" onclick="katilimciMod()">ÖĞRENCİ: Katıl</button>
    </div>

    <div id="ekran-mod-kurulum" class="ekran">
        <h2>Oda Kodu:</h2>
        <div style="font-size: 60px; font-weight: bold; color: var(--ana);" id="oda-kodu">----</div>
        <p id="katilim-bilgi">Öğrenciler bekleniyor...</p>
        <div id="mod-liste" style="margin-top: 20px;"></div>
        <button id="btn-baslat" class="buton" style="margin-top:30px" onclick="yarismayiBaslat()" disabled>Yarışmayı Başlat</button>
    </div>

    <div id="ekran-mod-oyun" class="ekran">
        <h2 id="mod-kategori">Kategori</h2>
        <h1 id="mod-soru">Soru?</h1>
        <div id="timer">30</div>
        <div id="mod-durum">0 / 0 Cevapladı</div>
        
        <div id="mod-analiz" style="display:none;">
            <h2 id="analiz-cevap" style="color: green;"></h2>
            <div class="merdiven" id="podyum"></div>
            <p id="analiz-ses" style="font-style: italic; margin-top:15px;"></p>
        </div>
    </div>

    <div id="ekran-katil" class="ekran">
        <h2>Yarışmaya Giriş</h2>
        <input type="text" id="inp-kod" class="girdi" placeholder="ODA KODU" maxlength="4"><br>
        <input type="text" id="inp-isim" class="girdi" placeholder="ADINIZ SOYADINIZ"><br>
        <button class="buton vurgu-buton" onclick="odayaBaglan()">ODAYA GİR</button>
    </div>

    <div id="ekran-oyuncu-oyun" class="ekran">
        <div id="oyuncu-alan"></div>
    </div>

    <script>
        // --- 20 SORULUK BANKA (Sf 262 - 270) ---
        const banka = [
            { t: "test", k: "Akâid (Sf 262)", s: "Ruhlarımız yaratıldığında Allah'a verdiğimiz söz zamanına ne denir?", o: ["Mîsâk", "Ezel", "Ahiret", "Kıyamet"], c: 0 },
            { t: "sirala", k: "İbadet (Sf 267)", s: "Abdestin farzlarını doğru sıraya koyunuz:", o: ["Yüzü yıkamak", "Elleri yıkamak", "Baş meshi", "Ayakları yıkamak"], c: [0, 1, 2, 3] },
            { t: "test", k: "Soyumuz (Sf 263)", s: "Kimin milletindeniz?", o: ["Hz. Adem", "Hz. İbrahim", "Hz. Muhammed", "Hz. Musa"], c: 1 },
            { t: "test", k: "Siyer (Sf 264)", s: "Peygamber Efendimiz kaç yaşında peygamber oldu?", o: ["25", "40", "63", "50"], c: 1 },
            { t: "sirala", k: "Siyer (Sf 264)", s: "Efendimizin kızlarını yaştan küçüğe sıralayın (En büyük Zeynep):", o: ["Zeynep", "Rukiye", "Ümmü Gülsüm", "Fatıma"], c: [0, 1, 2, 3] },
            { t: "test", k: "Mezhepler (Sf 266)", s: "İtikatta mezhebimiz hangisidir?", o: ["Maturidi", "Eşari", "Hanefi", "Şafii"], c: 0 },
            { t: "test", k: "İbadet (Sf 268)", s: "Günlük kılınan namaz toplam kaç rekattır?", o: ["17", "33", "40", "20"], c: 2 },
            { t: "sirala", k: "Kandiller (Sf 269)", s: "Takvim sırasına göre kandilleri dizin (İlk Mevlit):", o: ["Mevlit", "Regaip", "Miraç", "Berat", "Kadir"], c: [0, 1, 2, 3, 4] },
            { t: "test", k: "Melekler (Sf 265)", s: "Rızık işlerinden sorumlu büyük melek hangisidir?", o: ["Cebrail", "Mikail", "İsrafil", "Azrail"], c: 1 },
            { t: "test", k: "İbadet (Sf 267)", s: "Guslün farzı kaçtır?", o: ["1", "2", "3", "4"], c: 2 },
            { t: "test", k: "Peygamberler (Sf 265)", s: "Hz. Davud'a (a.s) hangi kitap inmiştir?", o: ["Tevrat", "Zebur", "İncil", "Kur'an"], c: 1 },
            { t: "test", k: "Siyer (Sf 263)", s: "Efendimiz'in süt annesinin ismi nedir?", o: ["Amine", "Halime", "Şifa", "Hatice"], c: 1 },
            { t: "sirala", k: "İbadet (Sf 267)", s: "Guslün farzlarını sırayla yapın:", o: ["Ağza su", "Burnuna su", "Tüm vücudu yıkamak"], c: [0, 1, 2] },
            { t: "test", k: "Akaid (Sf 262)", s: "Allah'ın zatı hakkında düşünmek caiz midir?", o: ["Evet", "Hayır", "Sadece Alimler", "Vacip"], c: 1 },
            { t: "test", k: "Mezhep (Sf 266)", s: "Semerkant'ın Maturid köyünde doğan imamımız kimdir?", o: ["Ebu Hanife", "İmam Şafii", "Ebu Mansur Maturidi", "İmam Eşari"], c: 2 },
            { t: "test", k: "Siyer (Sf 263)", s: "Efendimiz'in babasının adı nedir?", o: ["Abdülmuttalib", "Ebu Talib", "Abdullah", "Hamza"], c: 2 },
            { t: "test", k: "İbadet (Sf 269)", s: "Namazda zammı sureyi unutunca ne gerekir?", o: ["Kaza", "Sehiv Secdesi", "Tövbe", "Yeniden Kılmak"], c: 1 },
            { t: "test", k: "Melekler (Sf 265)", s: "Ölüm meleği olarak bilinen büyük melek?", o: ["İsrafil", "Azrail", "Cebrail", "Mikail"], c: 1 },
            { t: "test", k: "Kitaplar (Sf 265)", s: "Suhuflar toplam kaç tanedir?", o: ["10", "50", "100", "110"], c: 2 },
            { t: "test", k: "Siyer (Sf 263)", s: "Kimin zürriyetindensin?", o: ["Hz. Adem", "Hz. İbrahim", "Hz. İsmail", "Hz. Nuh"], c: 0 }
        ];

        let peer, conn, roomID, players = [], currentQ = 0, clock;

        function kurucuMod() {
            roomID = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('oda-kodu').innerText = roomID;
            peer = new Peer("DIN-" + roomID);
            peer.on('open', () => document.getElementById('ekran-giris').className = 'ekran');
            peer.on('open', () => document.getElementById('ekran-mod-kurulum').className = 'ekran aktif');
            peer.on('connection', c => {
                c.on('data', data => {
                    if(data.type === 'JOIN') {
                        players.push({ id: c.peer, conn: c, name: data.name, score: 0, ans: null, time: 0 });
                        konus("Hoş geldin " + data.name + ", seni görmek güzel.");
                        guncelleModListe();
                    }
                    if(data.type === 'ANS') {
                        let p = players.find(x => x.id === c.peer);
                        p.ans = data.val; p.time = Date.now();
                        guncelleDurum();
                    }
                });
            });
        }

        function guncelleModListe() {
            document.getElementById('mod-liste').innerHTML = players.map(p => `<b style="padding:10px; border:1px solid #ddd; border-radius:10px; margin:5px; display:inline-block;">${p.name}</b>`).join(' ');
            document.getElementById('btn-baslat').disabled = players.length === 0;
            document.getElementById('btn-baslat').innerText = players.length + " Öğrenciyi Başlat";
        }

        function yarismayiBaslat() {
            document.getElementById('ekran-mod-kurulum').className = 'ekran';
            document.getElementById('ekran-mod-oyun').className = 'ekran aktif';
            broadcast({ type: 'START' });
            soruYukle();
        }

        function soruYukle() {
            players.forEach(p => p.ans = null);
            let q = banka[currentQ];
            document.getElementById('mod-kategori').innerText = q.k;
            document.getElementById('mod-soru').innerText = q.s;
            document.getElementById('mod-analiz').style.display = 'none';
            broadcast({ type: 'QUES', q: q });
            sayac(30);
            guncelleDurum();
        }

        function guncelleDurum() {
            let n = players.filter(p => p.ans !== null).length;
            document.getElementById('mod-durum').innerText = `${n} / ${players.length} Kişi Cevapladı`;
            if(n === players.length && players.length > 0) analiz();
        }

        function analiz() {
            clearInterval(clock);
            let q = banka[currentQ];
            players.forEach(p => {
                let isTrue = JSON.stringify(p.ans) === JSON.stringify(q.c);
                if(isTrue) p.score += 10;
                p.conn.send({ type: 'RESULT', isTrue: isTrue });
            });

            let dogruSayisi = players.filter(p => JSON.stringify(p.ans) === JSON.stringify(q.c)).length;
            let top3 = [...players].sort((a,b) => b.score - a.score).slice(0, 3);
            
            document.getElementById('analiz-cevap').innerText = "Doğru Cevap Verildi!";
            document.getElementById('analiz-ses').innerText = `${players.length} öğrenciden ${dogruSayisi} tanesi bildi.`;
            document.getElementById('mod-analiz').style.display = 'block';

            document.getElementById('podyum').innerHTML = top3.map((p, i) => `
                <div class="podium ${['gold','silver','bronze'][i]}">
                    <div style="font-size:11px">${p.name}</div>
                    <span>${i+1}</span>
                </div>
            `).join('');

            konus(q.s + " sorusu bitti. Sınıfın %" + Math.round((dogruSayisi/players.length)*100) + " kadarı doğru cevap verdi. Şu an lider koltuğunda " + top3[0].name + " var.");

            setTimeout(() => {
                if(currentQ < banka.length - 1) { currentQ++; soruYukle(); }
                else konus("Yarışma bitti. Şampiyonumuz " + top3[0].name + "! Hepinizi tebrik ederim.");
            }, 8000);
        }

        // --- ÖĞRENCİ MANTIĞI ---
        function katilimciMod() {
            document.getElementById('ekran-giris').className = 'ekran';
            document.getElementById('ekran-katil').className = 'ekran aktif';
        }

        function odayaBaglan() {
            let kod = document.getElementById('inp-kod').value.toUpperCase();
            let isim = document.getElementById('inp-isim').value;
            if(!kod || !isim) return;

            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect("DIN-" + kod);
                conn.on('open', () => {
                    conn.send({ type: 'JOIN', name: isim });
                    document.getElementById('ekran-katil').innerHTML = `<h1>Bağlandın ${isim}!</h1><p>Hocanın başlatması bekleniyor...</p>`;
                });
                conn.on('data', data => {
                    if(data.type === 'START') {
                        document.getElementById('ekran-katil').style.display = 'none';
                        document.getElementById('ekran-oyuncu-oyun').className = 'ekran aktif';
                    }
                    if(data.type === 'QUES') oyuncuSoru(data.q);
                    if(data.type === 'RESULT' && data.isTrue) {
                        confetti();
                        if(navigator.vibrate) navigator.vibrate(200);
                    }
                });
            });
        }

        function oyuncuSoru(q) {
            const alan = document.getElementById('oyuncu-alan');
            alan.innerHTML = `<h3>${q.k}</h3><h2 style="font-size:24px">${q.s}</h2>`;

            if(q.t === 'test') {
                q.o.forEach((o, i) => {
                    let b = document.createElement('button');
                    b.className = 'cevap-btn'; b.innerText = o;
                    b.style.background = ['#e74c3c','#3498db','#2ecc71','#f1c40f'][i] || '#8e44ad';
                    b.onclick = () => { conn.send({ type: 'ANS', val: i }); alan.innerHTML = "<h2>Cevap Gönderildi!</h2>"; };
                    alan.appendChild(b);
                });
            } else if(q.t === 'sirala') {
                let secilenler = [];
                let renderSirala = () => {
                    alan.innerHTML = `<h3>${q.s}</h3><p>Seçim Sırasına Göre Tıkla:</p>`;
                    q.o.forEach((o, i) => {
                        let isSelected = secilenler.includes(i);
                        let b = document.createElement('div');
                        b.className = 'sirala-item' + (isSelected ? ' selected' : '');
                        b.innerText = o;
                        if(isSelected) b.setAttribute('data-index', secilenler.indexOf(i) + 1);
                        b.onclick = () => {
                            if(!isSelected) { secilenler.push(i); renderSirala(); }
                        };
                        alan.appendChild(b);
                    });
                    
                    let sBtn = document.createElement('button');
                    sBtn.className = 'buton'; sBtn.innerText = "TEMİZLE";
                    sBtn.onclick = () => { secilenler = []; renderSirala(); };
                    alan.appendChild(sBtn);

                    if(secilenler.length === q.o.length) {
                        let okBtn = document.createElement('button');
                        okBtn.className = 'buton vurgu-buton'; okBtn.innerText = "SIRALAMAYI GÖNDER";
                        okBtn.onclick = () => { conn.send({ type: 'ANS', val: secilenler }); alan.innerHTML = "<h2>Sıralama Gönderildi!</h2>"; };
                        alan.appendChild(okBtn);
                    }
                };
                renderSirala();
            }
        }

        // --- GENEL ARAÇLAR ---
        function sayac(sn) {
            let k = sn; clearInterval(clock);
            clock = setInterval(() => { k--; document.getElementById('timer').innerText = k; if(k<=0) analiz(); }, 1000);
        }
        function broadcast(d) { players.forEach(p => p.conn.send(d)); }
        function konus(m) { let u = new SpeechSynthesisUtterance(m); u.lang = 'tr-TR'; window.speechSynthesis.speak(u); }
    </script>
</body>
</html>
