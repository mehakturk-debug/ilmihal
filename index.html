<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinimi Öğreniyorum - Dijital Yarışma</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --ana: #004d40; --ikinci: #009688; --vurgu: #ffc107; --zemin: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--zemin); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .ekran { display: none; width: 90%; max-width: 800px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .aktif { display: block; animation: gelme 0.5s ease; }
        @keyframes gelme { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .buton { background: var(--ana); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; }
        .buton:hover { background: var(--ikinci); transform: scale(1.05); }
        .vurgu-buton { background: var(--vurgu); color: #333; }
        
        .girdi { padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 15px; margin: 10px; width: 80%; text-align: center; outline: none; }
        .oda-kodu { font-size: 40px; font-weight: bold; color: var(--ana); letter-spacing: 5px; margin: 20px; }
        
        .avatar-liste { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .av { font-size: 40px; cursor: pointer; border: 3px solid transparent; border-radius: 50%; padding: 5px; }
        .av.secili { border-color: var(--vurgu); background: #fffde7; }
        
        .oyuncu-kutu { display: inline-block; background: white; border: 2px solid var(--ana); border-radius: 15px; padding: 10px; margin: 5px; }
        .oyuncu-kutu.cevap-verdi { background: #c8e6c9; }

        .cevap-buton { width: 100%; height: 100px; font-size: 24px; color: white; border: none; border-radius: 20px; margin: 10px 0; cursor: pointer; font-weight: bold; box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        #timer { font-size: 30px; font-weight: bold; color: #d32f2f; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="ekran-giris" class="ekran aktif">
        <h1>🌙 Dinimi Öğreniyorum</h1>
        <p>Lütfen bir giriş yöntemi seçiniz:</p>
        <button class="buton" onclick="moderatörKur()">ODA KUR (ÖĞRETMEN)</button>
        <button class="buton vurgu-buton" onclick="oyuncuKatil()">ODAYA KATIL (ÖĞRENCİ)</button>
    </div>

    <!-- ÖĞRETMEN: KURULUM EKRANI -->
    <div id="ekran-mod-kurulum" class="ekran">
        <h2>Oda Kuruldu</h2>
        <p>Öğrenciler için Giriş Kodu:</p>
        <div class="oda-kodu" id="mod-oda-kodu">----</div>
        <div id="mod-oyuncu-listesi"></div>
        <br>
        <button id="baslat-buton" class="buton" onclick="yarismayiBaslat()" disabled>Öğrenciler Bekleniyor...</button>
    </div>

    <!-- ÖĞRETMEN: OYUN EKRANI -->
    <div id="ekran-mod-oyun" class="ekran">
        <h3 id="mod-kategori" style="color: var(--ikinci);">Kategori</h3>
        <h1 id="mod-soru">Soru buraya gelecek?</h1>
        <div id="mod-durum">Cevap Bekleniyor: 0 / 0</div>
        <div id="timer">20</div>
        <div id="analiz-kutu" style="display:none; margin-top:20px; background: #e0f2f1; padding: 20px; border-radius: 15px;">
            <h2 id="dogru-cevap-metni" style="color: #2e7d32;">Doğru Cevap: ...</h2>
            <p id="sesli-analiz-metni"></p>
        </div>
    </div>

    <!-- ÖĞRENCİ: KATILIM EKRANI -->
    <div id="ekran-oyuncu-katil" class="ekran">
        <h2>Odaya Katıl</h2>
        <input type="text" id="oyuncu-oda-input" class="girdi" placeholder="4 Haneli Kod" maxlength="4"><br>
        <input type="text" id="oyuncu-isim-input" class="girdi" placeholder="Adın Soyadın"><br>
        <div class="avatar-liste" id="avatar-liste"></div>
        <button class="buton" onclick="odayaBaglan()">GİRİŞ YAP</button>
    </div>

    <!-- ÖĞRENCİ: BEKLEME EKRANI -->
    <div id="ekran-oyuncu-bekle" class="ekran">
        <div id="oyuncu-profil-ozet" style="font-size: 80px;"></div>
        <h2 id="oyuncu-isim-ozet"></h2>
        <p>Hocanızın oyunu başlatması bekleniyor...</p>
    </div>

    <!-- ÖĞRENCİ: CEVAP EKRANI -->
    <div id="ekran-oyuncu-cevap" class="ekran">
        <div id="cevap-alanı"></div>
    </div>

    <script>
        // --- SORU BANKASI (262-270) ---
        const sorular = [
            {k:"İman (Sf. 262)", s:"'Belâ' zamanı neye derler?", o:["Mîsâk","Dünya","Ahiret","Hicret"], c:0},
            {k:"Soyumuz (Sf. 263)", s:"Kimin milletindensin?", o:["Hz. Adem","Hz. İbrahim","Hz. Muhammed","Hz. Musa"], c:1},
            {k:"Peygamberimiz (Sf. 264)", s:"Efendimizin kaç oğlu doğmuştur?", o:["2","3","4","7"], c:1},
            {k:"Melekler (Sf. 265)", s:"Rızıkları yöneten melek hangisidir?", o:["Cebrail","Mikail","İsrafil","Azrail"], c:1},
            {k:"Mezhepler (Sf. 266)", s:"Amelde mezhebimiz hangisidir?", o:["Maturidi","Eşari","Hanefi","Şafii"], c:2},
            {k:"32 Farz (Sf. 267)", s:"Abdestin farzı kaçtır?", o:["3","4","6","12"], c:1},
            {k:"Namaz (Sf. 268)", s:"Bir günlük namaz toplam kaç rekattır?", o:["17","33","40","20"], c:2},
            {k:"Sehiv Secdesi (Sf. 269)", s:"Zammı sureyi unutan ne yapmalıdır?", o:["Kaza","Sehiv Secdesi","Tövbe","Yeniden kıl"], c:1},
            {k:"Kandiller (Sf. 270)", s:"Kur'an'ın inmeye başladığı gece?", o:["Mevlit","Miraç","Kadir","Berat"], c:2},
            {k:"Genel (Sf. 263)", s:"Kimin zürriyetindensin?", o:["Hz. Adem","Hz. İbrahim","Hz. Muhammed","Hz. Nuh"], c:0}
        ];

        let peer, conn, roomCode, players = [], currentQ = 0, timerObj;
        const avatars = ["🦁","🦊","🐼","🐨","🐯","🦉","🚀","⚽"];
        let selectedAv = avatars[0];

        // --- NAVİGASYON ---
        function ekranGoster(id) {
            document.querySelectorAll('.ekran').forEach(e => e.classList.remove('aktif'));
            document.getElementById(id).classList.add('aktif');
        }

        // --- MODERATÖR İŞLEMLERİ ---
        function moderatörKur() {
            roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('mod-oda-kodu').innerText = roomCode;
            peer = new Peer("DIN-" + roomCode);
            peer.on('open', () => ekranGoster('ekran-mod-kurulum'));
            peer.on('connection', c => {
                c.on('data', data => {
                    if(data.type === 'KATIL') {
                        players.push({ id: c.peer, conn: c, name: data.name, av: data.av, score: 0, ans: null, time: 0 });
                        oyuncuListesiGuncelle();
                    }
                    if(data.type === 'CEVAP') {
                        let p = players.find(x => x.id === c.peer);
                        p.ans = data.idx;
                        p.time = Date.now();
                        durumGuncelle();
                    }
                });
            });
        }

        function oyuncuListesiGuncelle() {
            const liste = document.getElementById('mod-oyuncu-listesi');
            liste.innerHTML = players.map(p => `<div class="oyuncu-kutu ${p.ans !== null ? 'cevap-verdi' : ''}"><span>${p.av}</span><br><b>${p.name}</b></div>`).join('');
            document.getElementById('baslat-buton').disabled = players.length === 0;
            document.getElementById('baslat-buton').innerText = players.length + " Öğrenciyle Başlat";
        }

        function yarismayiBaslat() {
            ekranGoster('ekran-mod-oyun');
            yayinla({ type: 'BASLA' });
            soruYukle();
        }

        function soruYukle() {
            players.forEach(p => p.ans = null);
            let s = sorular[currentQ];
            document.getElementById('mod-kategori').innerText = s.k;
            document.getElementById('mod-soru').innerText = s.s;
            document.getElementById('analiz-kutu').style.display = 'none';
            durumGuncelle();
            oyuncuListesiGuncelle();
            yayinla({ type: 'SORU', o: s.o });
            sayacBaslat(20);
        }

        function sayacBaslat(sn) {
            let kalan = sn;
            document.getElementById('timer').innerText = kalan;
            clearInterval(timerObj);
            timerObj = setInterval(() => {
                kalan--;
                document.getElementById('timer').innerText = kalan;
                if(kalan <= 0) bitir();
            }, 1000);
        }

        function durumGuncelle() {
            let c = players.filter(p => p.ans !== null).length;
            document.getElementById('mod-durum').innerText = `Cevap Verenler: ${c} / ${players.length}`;
            if(c === players.length && players.length > 0) bitir();
        }

        function bitir() {
            clearInterval(timerObj);
            let s = sorular[currentQ];
            let dogruSayisi = players.filter(p => p.ans === s.c).length;
            let enHizli = players.filter(p => p.ans === s.c).sort((a,b) => a.time - b.time)[0];
            
            let analiz = `${players.length} öğrenciden ${dogruSayisi} tanesi doğru bildi. `;
            if(enHizli) analiz += `En hızlı cevabı ${enHizli.name} verdi.`;

            document.getElementById('dogru-cevap-metni').innerText = "Doğru Cevap: " + s.o[s.c];
            document.getElementById('sesli-analiz-metni').innerText = analiz;
            document.getElementById('analiz-kutu').style.display = 'block';

            // SESLİ ANALİZ
            konus(`${s.s} sorusunun doğru cevabı ${s.o[s.c]} idi. ${analiz}`);

            // Oyunculara Sonuç Gönder
            players.forEach(p => p.conn.send({ type: 'SONUC', dogru: p.ans === s.c }));

            setTimeout(() => {
                if(currentQ < sorular.length - 1) { currentQ++; soruYukle(); }
                else konus("Yarışma sona erdi, hepinizi tebrik ederim.");
            }, 8000);
        }

        // --- OYUNCU İŞLEMLERİ ---
        function oyuncuKatil() {
            ekranGoster('ekran-oyuncu-katil');
            const avlar = document.getElementById('avatar-liste');
            avatars.forEach(a => {
                let div = document.createElement('div');
                div.className = 'av'; div.innerText = a;
                div.onclick = () => { 
                    document.querySelectorAll('.av').forEach(x => x.classList.remove('secili'));
                    div.classList.add('secili'); selectedAv = a;
                };
                avlar.appendChild(div);
            });
        }

        function odayaBaglan() {
            let kod = document.getElementById('oyuncu-oda-input').value.toUpperCase();
            let isim = document.getElementById('oyuncu-isim-input').value;
            if(!kod || !isim) return alert("Bilgileri doldur!");

            peer = new Peer();
            peer.on('open', (id) => {
                conn = peer.connect("DIN-" + kod);
                conn.on('open', () => {
                    conn.send({ type: 'KATIL', name: isim, av: selectedAv });
                    ekranGoster('ekran-oyuncu-bekle');
                    document.getElementById('oyuncu-isim-ozet').innerText = isim;
                    document.getElementById('oyuncu-profil-ozet').innerText = selectedAv;
                });
                conn.on('data', data => {
                    if(data.type === 'BASLA') ekranGoster('ekran-oyuncu-cevap');
                    if(data.type === 'SORU') soruGoster(data.o);
                    if(data.type === 'SONUC') {
                        if(data.dogru) {
                            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                            if(navigator.vibrate) navigator.vibrate(300);
                        }
                    }
                });
            });
        }

        function soruGoster(secenekler) {
            ekranGoster('ekran-oyuncu-cevap');
            const alan = document.getElementById('cevap-alanı');
            alan.innerHTML = "";
            const renkler = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f'];
            secenekler.forEach((s, i) => {
                let b = document.createElement('button');
                b.className = 'cevap-buton'; b.innerText = s;
                b.style.background = renkler[i];
                b.onclick = () => {
                    conn.send({ type: 'CEVAP', idx: i });
                    alan.innerHTML = "<h2>Cevap Gönderildi!<br>Tahtaya Bakınız...</h2>";
                };
                alan.appendChild(b);
            });
        }

        // --- ARAÇLAR ---
        function yayinla(data) { players.forEach(p => p.conn.send(data)); }
        function konus(metin) {
            let u = new SpeechSynthesisUtterance(metin);
            u.lang = 'tr-TR'; window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
